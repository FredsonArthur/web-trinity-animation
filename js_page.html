<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Module - Pixel Trinity</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
        }

        .content-container {
            border: 4px solid #F7DF1E;
            padding: 40px;
            background-color: #111;
            max-width: 600px;
            width: 90%;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stats-bar {
            width: 100%;
            height: 20px;
            background: #333;
            margin: 20px 0;
            border: 2px solid #fff;
        }

        .fill {
            height: 100%;
            background: #F7DF1E;
            width: 45%; /* Nível de maestria em JS */
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #00ff00;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="game-screen">
        <div class="content-container">
            <h1 style="color: #F7DF1E; font-size: 18px;">JAVASCRIPT CORE</h1>
            <p style="font-size: 12px; line-height: 1.6; margin-top: 20px;">
                O motor de interatividade. Responsável pela lógica, manipulação de dados e comportamento dinâmico.
            </p>
            
            <div class="stats-bar"><div class="fill"></div></div>
            <p style="font-size: 10px;">MASTERY LEVEL: 45%</p>

            <a href="index.html" class="back-link"><< RETURN TO MENU</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
