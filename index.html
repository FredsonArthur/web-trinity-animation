<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Trinity - Select Your Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-screen">
        <h1 class="pixel-title">SELECT YOUR TECH</h1>

        <div class="stage">
            
            <div class="pixel-wrapper" id="html-wrapper">
                <div class="pixel-icon" id="html-logo"></div>
                <span class="label">HTML</span>
            </div>

            <div class="pixel-wrapper" id="css-wrapper">
                <div class="pixel-icon" id="css-logo"></div>
                <span class="label">CSS</span>
            </div>

            <div class="pixel-wrapper" id="js-wrapper">
                <div class="pixel-icon" id="js-logo"></div>
                <span class="label">JAVASCRIPT</span>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
