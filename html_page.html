<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Module - Pixel Trinity</title>
    <link rel="stylesheet" href="style.css">
        <style>
        /* Estilos específicos para a página de conteúdo */
        .game-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh; /* Garante que ocupa a altura total para centralizar */
        }

        .content-container {
            border: 4px solid #E34F26;
            padding: 40px;
            background-color: #111;
            max-width: 600px;
            width: 90%;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stats-bar {
            width: 100%;
            height: 20px;
            background: #333;
            margin: 20px 0;
            border: 2px solid #fff;
        }

        .fill {
            height: 100%;
            background: #E34F26;
            width: 70%; /* Nível de maestria */
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #00ff00;
            text-decoration: none;
            font-size: 12px;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="game-screen">
        <div class="content-container">
            <h1 style="color: #E34F26; font-size: 18px;">HTML5 UNLOCKED</h1>
            <p style="font-size: 12px; line-height: 1.6; margin-top: 20px;">
                O esqueleto da web. Responsável pela estrutura semântica e acessibilidade.
            </p>
            
            <div class="stats-bar"><div class="fill"></div></div>
            <p style="font-size: 10px;">MASTRY LEVEL: 70%</p>

            <a href="index.html" class="back-link"><< RETURN TO MENU</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
